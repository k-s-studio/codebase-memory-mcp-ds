services:
  codebase-memory-ds:
    build:
      context: .
      args:
        CBM_VERSION: latest
    image: codebase-memory-ds:ui-local
    container_name: codebase-memory-ds
    # 3D 知識圖譜 UI。容器內 socat 監聽 0.0.0.0:9749 並轉到 UI 的 loopback port，
    # 開瀏覽器到 http://localhost:9749 即可。
    ports:
      - "9749:9749"
    volumes:
      # 索引快取持久化，避免每次重建 container 都要重新索引
      - cbm-ds-cache:/home/cbm/.cache/codebase-memory-mcp
      # 你要索引的原始碼根目錄，唯讀掛載到容器內的 /codebase-memory-mcp-ds（index_repository 只讀不寫）。
      # 必填、沒有預設值：install.ps1 會以 -WorkspacePath 自動注入；手動 compose 請先自行設定，例如
      #   PowerShell:  $env:CBM_WORKSPACE = "D:/code"
      # 沒設會直接報錯，不會偷偷掛一個寫死的路徑。
      - ${CBM_WORKSPACE:?set CBM_WORKSPACE to your source-code root, e.g. D:/code}:/codebase-memory-mcp-ds:ro

volumes:
  cbm-ds-cache:
